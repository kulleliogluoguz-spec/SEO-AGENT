  #     --model Qwen/Qwen3-235B-A22B-AWQ
  #     --quantization awq
  #     --tensor-parallel-size 4
  #     --max-model-len 32768
  #     --trust-remote-code
  #     --enable-auto-tool-choice
  #     --tool-call-parser hermes
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 4
  #             capabilities: [gpu]
  #   volumes:
  #     - vllm_cache:/root/.cache/huggingface
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/models || exit 1"]
