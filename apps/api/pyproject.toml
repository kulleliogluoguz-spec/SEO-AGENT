[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]
# Markers
markers = [
    "unit: fast unit tests, no external dependencies",
    "integration: tests that use the test database",
    "slow: slow tests (crawl, LLM calls)",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "N", "ANN"]
ignore = [
    "E501",    # line too long (handled by formatter)
    "B008",    # do not perform function calls in default args (FastAPI pattern)
    "ANN001",  # missing type annotation for function argument (FastAPI DI pattern)
    "ANN002",  # missing type annotation for *args
    "ANN003",  # missing type annotation for **kwargs
    "ANN101",  # missing type annotation for 'self'
    "ANN102",  # missing type annotation for 'cls'
    "ANN201",  # missing return type annotation for public function
    "ANN202",  # missing return type annotation for private function
    "ANN204",  # missing return type annotation for special method
    "ANN401",  # dynamically typed expressions
    "B904",    # raise from err (pre-existing pattern throughout codebase)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = true
plugins = ["pydantic.mypy"]
# Exclude test files from strict mypy
exclude = ["tests/"]

[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "*/migrations/*", "alembic/*"]

[tool.coverage.report]
skip_empty = true
show_missing = true
fail_under = 60
