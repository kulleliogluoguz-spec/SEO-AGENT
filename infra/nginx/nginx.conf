upstream frontend { server web:3000; }
upstream backend { server api:8000; }
upstream temporal_ui { server temporal-ui:8080; }
server {
    listen 80;
    client_max_body_size 20M;
    location /api/v1/ai/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_read_timeout 300s; proxy_send_timeout 300s; proxy_connect_timeout 60s; }
    location /api/v1/intelligence/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_read_timeout 360s; proxy_send_timeout 360s; proxy_connect_timeout 60s; }
    location /api/v1/email/sequences/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_read_timeout 360s; proxy_send_timeout 360s; proxy_connect_timeout 60s; }
    location /api/v1/organic/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_read_timeout 300s; proxy_send_timeout 300s; proxy_connect_timeout 60s; }
    location /api/v1/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_read_timeout 120s; }
    location /health { proxy_pass http://backend; proxy_set_header Host $host; }
    location /docs { proxy_pass http://backend; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://backend; proxy_set_header Host $host; }
    location /temporal/ { rewrite ^/temporal/(.*) /$1 break; proxy_pass http://temporal_ui; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection upgrade; }
    location / { proxy_pass http://frontend; proxy_set_header Host $host; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection upgrade; }
}
