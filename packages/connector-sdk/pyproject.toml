[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "connector-sdk"
version = "0.1.0"
description = "Connector SDK for AI Growth OS — unified source ingestion interface"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "tenacity>=8.0.0",
]

[project.optional-dependencies]
rss = ["feedparser>=6.0.11"]
reddit = ["praw>=7.7.1"]
all = ["feedparser>=6.0.11", "praw>=7.7.1"]

[tool.setuptools.packages.find]
where = ["."]
include = ["connector_sdk*"]
